name: Feature request
description: Suggest an improvement to Colony
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem should this solve for operators or developers?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and expected outcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or similar systems.
